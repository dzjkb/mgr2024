# @package _global_

defaults:
  - override /callbacks: graz_v0
  - override /model: vctk_words_v7
  - override /dataset: vctk_words

callbacks:
  encoder_training_len: 750000
  discriminator_warmup_len: 10000
  target_latent_weight: 0.0001
  latent_weight_warmup_length: 60000

model:
  mono: true
  fixed_length: 49152
  feature_loss_weight: 20.0
  adversarial_loss_weight: 1.0
  final_lr: 0.00005
  discriminator_lr: 0.0002

train_dataset_path: /media/Data/jp_dir/sounds/vctk_words_v2/audio_train
val_dataset_path: /media/Data/jp_dir/sounds/vctk_words_v2/audio_val
checkpoint_path: /home/jp/mgr2024/logs/vctk_words/version_9/checkpoints/last.ckpt
separate_run: true
log_dir: logs
experiment_name: vctk_words
batch_size: 10
epochs: 100
val_every: 1
