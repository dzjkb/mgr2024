# @package _global_

defaults:
  - override /callbacks: graz_v0
  - override /model: percussive2_v1
  - override /dataset: snares_1s

callbacks:
  encoder_training_len: 1000000
  discriminator_warmup_len: 0
  target_latent_weight: 0.0001
  latent_weight_warmup_length: 300000
  adversarial_losses_warmup_len: 0

model:
  mono: true
  fixed_length: 49152
  adversarial_loss_weight: 0.7
  feature_loss_weight: 20.0
  discriminator_lr: 0.000005

train_dataset_path: /media/Data/jp_dir/sounds/percussive2_train
val_dataset_path: /media/Data/jp_dir/sounds/percussive2_val
log_dir: logs
experiment_name: percussive2
batch_size: 12
epochs: 600
val_every: 10
