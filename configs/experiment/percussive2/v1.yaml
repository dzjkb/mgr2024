# @package _global_

defaults:
  - override /callbacks: graz_v0
  - override /model: ravestrides_96c_256l
  - override /dataset: snares_1s

callbacks:
  encoder_training_len: 1000000
  discriminator_warmup_len: 1000
  target_latent_weight: 0.0001
  latent_weight_warmup_length: 60000

model:
  initial_lr: 0.0001
  final_lr: 0.00005
  lr_decay_steps: 100000
  activation: relu
  mono: true
  fixed_length: 49152
  nf_prior_layers: null
  nf_posterior_layers: null
  monitor_grad_norm: true
  feature_loss_weight: 20.0
  adversarial_loss_weight: 1.0
  discriminator_lr: 0.0001
  grad_clip: 100000.0
  reduction_method: conv

train_dataset_path: /media/Data/jp_dir/sounds/percussive2_train
val_dataset_path: /media/Data/jp_dir/sounds/percussive2_val
log_dir: logs
experiment_name: percussive2
batch_size: 12
epochs: 600
val_every: 10
