capacity: 94
latent_size: 256
dilations:
  - [1, 3, 9]
  - [1, 3, 9]
  - [1, 3, 9]
  - [1, 3]
strides: [4, 4, 4, 2] 
lr_decay_steps: 500000
discriminator_lr: 0.00001
initial_lr: 0.0001
final_lr: 0.00005

feature_loss_weight: 20.0
adversarial_loss_weight: 0.5
activation: relu
reduction_method: conv
n_bands: 16

nf_prior_layers: 10
nf_posterior_layers: 10
monitor_grad_norm: false